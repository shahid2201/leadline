name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy app

  test-layers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: [unit, integration, contract, e2e, ai_regression]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run layer
        run: pytest -m ${{ matrix.layer }}

  full-suite:
    runs-on: ubuntu-latest
    needs: [quality, test-layers]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: OpenAPI export contract
        run: python scripts/export_openapi.py

      - name: Run full suite
        run: pytest
